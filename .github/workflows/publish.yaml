name: Scrape and publish

on:
  push:
    branches:
      - main
  schedule:
    # Twice daily at 12:00 and 18:00 UTC
    - cron: "0 12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Avoid two deploys racing; let a new push/schedule wait for the current one.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape latest FCC public file data
        run: python rss_parser.py

      - name: Commit new raw data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw
          git diff --staged --quiet || git commit -m "Latest data: $(date -u)"
          git pull --rebase origin main
          git push

      - name: Build site data
        run: python build_site.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
